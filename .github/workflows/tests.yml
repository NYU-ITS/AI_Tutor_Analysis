name: Tests

on:
  push:
    branches: [auto_pipeline, main, feature/test-suite-expansion]
    paths:
      - "student_analysis_pipeline/**"
      - "tests/**"
      - "pytest.ini"
      - "scripts/**"
      - "observability/**"
      - ".github/workflows/tests.yml"
  pull_request:
    branches: [auto_pipeline, main]
    paths:
      - "student_analysis_pipeline/**"
      - "tests/**"
      - "pytest.ini"
      - "scripts/**"
      - "observability/**"
      - ".github/workflows/tests.yml"
  workflow_dispatch:

permissions:
  contents: read
  checks: write

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r student_analysis_pipeline/requirements.txt
          pip install -r tests/requirements-testing.txt

      - name: Run unit and integration tests
        run: bash scripts/run_pytest_with_reports.sh

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/

      - name: Publish test results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: test-results/results.xml
          check_name: "Test Results"
          comment_mode: "off"

      - name: Forward quality metrics to Grafana Cloud
        if: always()
        env:
          GRAFANA_CLOUD_PROMETHEUS_URL: ${{ secrets.GRAFANA_CLOUD_PROMETHEUS_URL }}
          GRAFANA_CLOUD_PROMETHEUS_USER: ${{ secrets.GRAFANA_CLOUD_PROMETHEUS_USER }}
          GRAFANA_CLOUD_PROMETHEUS_PASSWORD: ${{ secrets.GRAFANA_CLOUD_PROMETHEUS_PASSWORD }}
          QUALITY_ENVIRONMENT: github-actions
          QUALITY_REPOSITORY: AI_Tutor_Analysis
          QUALITY_BRANCH: ${{ github.ref_name }}
          QUALITY_SOURCE: backend-ci
          QUALITY_RUN_ID: ${{ github.run_id }}
          QUALITY_COMMIT_SHA: ${{ github.sha }}
          QUALITY_METRICS_TARGET: host.docker.internal:9109
          QUALITY_FORWARD_SECONDS: "45"
        run: |
          if [[ -z "${GRAFANA_CLOUD_PROMETHEUS_URL}" || -z "${GRAFANA_CLOUD_PROMETHEUS_USER}" || -z "${GRAFANA_CLOUD_PROMETHEUS_PASSWORD}" ]]; then
            echo "Grafana Cloud secrets are not configured; skipping metrics forwarding."
            exit 0
          fi
          python scripts/serve_test_metrics.py --host 0.0.0.0 &
          exporter_pid=$!
          trap 'kill ${exporter_pid} >/dev/null 2>&1 || true' EXIT
          sleep 3
          curl -fsS http://127.0.0.1:9109/metrics >/dev/null
          bash scripts/forward_metrics_to_grafana_cloud.sh
