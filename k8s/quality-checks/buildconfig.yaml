apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: ai-tutor-quality-checks
---
apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: ai-tutor-quality-checks
spec:
  failedBuildsHistoryLimit: 2
  successfulBuildsHistoryLimit: 2
  runPolicy: Serial
  source:
    type: Git
    git:
      uri: git@github.com:NYU-ITS/AI_Tutor_Analysis.git
      ref: feature/test-suite-expansion
    sourceSecret:
      name: github-rts-open-webui
  strategy:
    type: Docker
    dockerStrategy:
      dockerfilePath: quality_checks/Dockerfile
      volumes:
        - name: ai-tutor-quality-check-secrets
          source:
            type: Secret
            secret:
              secretName: open-webui-mastering-homework-secret
          mounts:
            - destinationPath: /var/run/ai-tutor-quality-secrets
        - name: ai-tutor-test-artifacts-bucket-secret
          source:
            type: Secret
            secret:
              secretName: ai-tutor-test-artifacts-bucket
          mounts:
            - destinationPath: /var/run/ai-tutor-artifacts-secret
      env:
        - name: BUCKET_HOST
          value: s3.openshift-storage.svc
        - name: BUCKET_NAME
          value: ai-tutor-test-artifacts-9d35ede8-55f6-4d72-8a4c-8881b0d844f3
        - name: BUCKET_PORT
          value: "443"
        - name: BUCKET_TLS_VERIFY
          value: "false"
        - name: ARTIFACT_PREFIX
          value: openshift/backend/dev
  output:
    to:
      kind: ImageStreamTag
      name: ai-tutor-quality-checks:latest
  postCommit:
    script: bash scripts/run_openshift_quality_checks_from_build.sh
  triggers:
    - type: ImageChange
      imageChange:
        from:
          kind: ImageStreamTag
          name: open-webui-mastering-homework:latest
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi
