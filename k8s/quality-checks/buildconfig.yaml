apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: ai-tutor-quality-checks
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ai-tutor-quality-checks-secret-reader
rules:
  - apiGroups:
      - ""
    resources:
      - secrets
    resourceNames:
      - open-webui-mastering-homework-secret
    verbs:
      - get
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ai-tutor-quality-checks-secret-reader
subjects:
  - kind: ServiceAccount
    name: builder
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: ai-tutor-quality-checks-secret-reader
---
apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: ai-tutor-quality-checks
spec:
  failedBuildsHistoryLimit: 2
  successfulBuildsHistoryLimit: 2
  runPolicy: Serial
  source:
    type: Git
    git:
      uri: git@github.com:NYU-ITS/AI_Tutor_Analysis.git
      ref: feature/test-suite-expansion
    sourceSecret:
      name: github-rts-open-webui
  strategy:
    type: Docker
    dockerStrategy:
      dockerfilePath: quality_checks/Dockerfile
  output:
    to:
      kind: ImageStreamTag
      name: ai-tutor-quality-checks:latest
  postCommit:
    script: bash scripts/run_openshift_quality_checks_from_build.sh
  triggers:
    - type: ImageChange
      imageChange:
        from:
          kind: ImageStreamTag
          name: open-webui-mastering-homework:latest
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi
