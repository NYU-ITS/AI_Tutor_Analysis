apiVersion: batch/v1
kind: Job
metadata:
  name: ai-tutor-backend-post-deploy-quality-check
  labels:
    app.kubernetes.io/name: ai-tutor-backend-post-deploy-quality-check
    app.kubernetes.io/component: backend-quality-check
    app.kubernetes.io/part-of: ai-tutor-quality
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 3600
  template:
    spec:
      automountServiceAccountToken: false
      restartPolicy: Never
      containers:
        - name: backend-post-deploy-quality-checks
          image: image-registry.openshift-image-registry.svc:5000/rit-genai-naga-dev/ai-tutor-quality-checks:latest
          imagePullPolicy: Always
          env:
            - name: LIVE_API_BASE_URL
              value: http://open-webui-mastering-homework.rit-genai-naga-dev.svc:8000
            - name: LIVE_FRONTEND_BASE_URL
              value: http://open-webui.rit-genai-naga-dev.svc:80
            - name: PORTKEY_BASE_URL
              value: https://ai-gateway.apps.cloud.rt.nyu.edu/v1
            - name: QUALITY_ENVIRONMENT
              value: openshift-dev
            - name: QUALITY_REPOSITORY
              value: AI_Tutor_Analysis
            - name: QUALITY_BRANCH
              value: feature/test-suite-expansion
            - name: QUALITY_SOURCE
              value: openshift-backend-post-deploy-checks
            - name: QUALITY_RUN_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: QUALITY_COMMIT_SHA
              value: openshift-build
            - name: QUALITY_FORWARD_SECONDS
              value: "75"
            - name: QUALITY_PUSHGATEWAY_URL
              value: http://ai-tutor-quality-pushgateway:9091
            - name: ARTIFACT_PREFIX
              value: openshift/backend/dev
            - name: BUCKET_TLS_VERIFY
              value: "false"
            - name: PORTKEY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: open-webui-mastering-homework-secret
                  key: portkey-api-key
            - name: PIPELINE_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: open-webui-mastering-homework-secret
                  key: pipeline-database-url
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: open-webui-mastering-homework-secret
                  key: database-url
          envFrom:
            - secretRef:
                name: ai-tutor-test-artifacts-bucket
            - configMapRef:
                name: ai-tutor-test-artifacts-bucket
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
