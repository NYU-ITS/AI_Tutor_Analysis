apiVersion: batch/v1
kind: Job
metadata:
  name: ai-tutor-test-artifacts-lifecycle
  labels:
    app.kubernetes.io/name: ai-tutor-test-artifacts-lifecycle
    app.kubernetes.io/component: artifact-storage
    app.kubernetes.io/part-of: ai-tutor-observability
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ai-tutor-test-artifacts-lifecycle
        app.kubernetes.io/component: artifact-storage
        app.kubernetes.io/part-of: ai-tutor-observability
    spec:
      restartPolicy: Never
      nodeSelector:
        topology.kubernetes.io/region: rcdc
      containers:
        - name: lifecycle
          image: image-registry.openshift-image-registry.svc:5000/rit-genai-naga-dev/ai-tutor-quality-checks:latest
          imagePullPolicy: Always
          command:
            - python
            - scripts/quality_artifact_store.py
            - apply-lifecycle
            - --days
            - "30"
          envFrom:
            - secretRef:
                name: ai-tutor-test-artifacts-bucket
            - configMapRef:
                name: ai-tutor-test-artifacts-bucket
          env:
            - name: BUCKET_TLS_VERIFY
              value: "false"
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
