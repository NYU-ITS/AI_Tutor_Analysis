apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-tutor-quality-artifact-viewer
  labels:
    app.kubernetes.io/name: ai-tutor-quality-artifact-viewer
    app.kubernetes.io/component: artifact-viewer
    app.kubernetes.io/part-of: ai-tutor-observability
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ai-tutor-quality-artifact-viewer
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ai-tutor-quality-artifact-viewer
        app.kubernetes.io/component: artifact-viewer
        app.kubernetes.io/part-of: ai-tutor-observability
    spec:
      nodeSelector:
        topology.kubernetes.io/region: rcdc
      containers:
        - name: artifact-viewer
          image: image-registry.openshift-image-registry.svc:5000/rit-genai-naga-dev/ai-tutor-quality-checks:latest
          imagePullPolicy: Always
          command:
            - python
            - scripts/quality_artifact_store.py
            - serve
            - --host
            - 0.0.0.0
            - --port
            - "8080"
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - secretRef:
                name: ai-tutor-test-artifacts-bucket
            - configMapRef:
                name: ai-tutor-test-artifacts-bucket
          env:
            - name: ARTIFACT_PREFIXES
              value: OpenShift backend=openshift/backend/dev,OpenShift frontend=openshift/frontend/dev,GitHub backend=github/backend/feature-test-suite-expansion,GitHub frontend=github/frontend/rs-ai-tutor-tests
            - name: BUCKET_TLS_VERIFY
              value: "false"
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: ai-tutor-quality-artifact-viewer
  labels:
    app.kubernetes.io/name: ai-tutor-quality-artifact-viewer
    app.kubernetes.io/component: artifact-viewer
    app.kubernetes.io/part-of: ai-tutor-observability
spec:
  selector:
    app.kubernetes.io/name: ai-tutor-quality-artifact-viewer
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: ai-tutor-quality-artifacts
  labels:
    app.kubernetes.io/name: ai-tutor-quality-artifact-viewer
    app.kubernetes.io/component: artifact-viewer
    app.kubernetes.io/part-of: ai-tutor-observability
spec:
  to:
    kind: Service
    name: ai-tutor-quality-artifact-viewer
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
