apiVersion: batch/v1
kind: Job
metadata:
  name: ai-tutor-github-playwright-artifact-sync
  labels:
    app.kubernetes.io/name: ai-tutor-github-playwright-artifact-sync
    app.kubernetes.io/component: artifact-sync
    app.kubernetes.io/part-of: ai-tutor-observability
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ai-tutor-github-playwright-artifact-sync
        app.kubernetes.io/component: artifact-sync
        app.kubernetes.io/part-of: ai-tutor-observability
    spec:
      restartPolicy: Never
      nodeSelector:
        topology.kubernetes.io/region: rcdc
      containers:
        - name: artifact-sync
          image: image-registry.openshift-image-registry.svc:5000/rit-genai-naga-dev/ai-tutor-quality-checks:latest
          imagePullPolicy: Always
          command:
            - python
            - scripts/quality_artifact_store.py
            - sync-github-playwright
          envFrom:
            - secretRef:
                name: ai-tutor-test-artifacts-bucket
            - configMapRef:
                name: ai-tutor-test-artifacts-bucket
          env:
            - name: GITHUB_OWNER
              value: NYU-ITS
            - name: GITHUB_REPOSITORY_NAME
              value: NAGA-open-webui
            - name: GITHUB_BRANCH_FILTER
              value: rs/ai-tutor-tests
            - name: ARTIFACT_PREFIX
              value: github/frontend/rs-ai-tutor-tests
            - name: BUCKET_TLS_VERIFY
              value: "false"
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: ai-tutor-github-metrics-sync-secret
                  key: GITHUB_TOKEN
                  optional: false
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
