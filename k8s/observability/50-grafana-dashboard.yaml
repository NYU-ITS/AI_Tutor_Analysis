apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: ai-tutor-quality-openshift
  labels:
    app.kubernetes.io/name: ai-tutor-quality-openshift
    app.kubernetes.io/component: grafana-dashboard
    app.kubernetes.io/part-of: ai-tutor-observability
spec:
  instanceSelector:
    matchLabels:
      app.kubernetes.io/name: ai-tutor-quality-grafana
  uid: ai-tutor-quality-openshift
  datasources:
    - inputName: DS_PROMETHEUS
      datasourceName: AI Tutor Quality Prometheus
  json: |
    {
      "uid": "ai-tutor-quality-openshift",
      "title": "AI Tutor Quality - OpenShift",
      "schemaVersion": 39,
      "version": 2,
      "refresh": "30s",
      "time": {
        "from": "now-30d",
        "to": "now"
      },
      "tags": [
        "ai-tutor",
        "quality",
        "openshift"
      ],
      "panels": [
        {
          "id": 1,
          "type": "text",
          "title": "Dashboard Guide",
          "gridPos": {
            "h": 4,
            "w": 24,
            "x": 0,
            "y": 0
          },
          "options": {
            "mode": "markdown",
            "content": "## AI Tutor Quality - OpenShift\nDeployment-level checks only. Backend panels show smoke, integration, health, database, and Portkey checks from OpenShift. Frontend panels show live Playwright workflows against the deployed dev frontend. GitHub CI and local runs stay on separate dashboards."
          }
        },
        {
          "id": 2,
          "type": "stat",
          "title": "Backend Status",
          "description": "Latest backend deployed-environment quality signal.",
          "datasource": {
            "type": "prometheus",
            "uid": "ai_tutor_quality_prometheus"
          },
          "gridPos": {
            "h": 5,
            "w": 4,
            "x": 0,
            "y": 4
          },
          "targets": [
            {
              "refId": "A",
              "expr": "max(ai_tutor_quality_source_ok{environment=\"openshift-dev\",repository=\"AI_Tutor_Analysis\",source=\"live_observability\"})",
              "instant": true,
              "range": false
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "none",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "red",
                    "value": null
                  },
                  {
                    "color": "green",
                    "value": 1
                  }
                ]
              },
              "mappings": [
                {
                  "type": "value",
                  "options": {
                    "0": {
                      "text": "Needs attention",
                      "color": "red"
                    },
                    "1": {
                      "text": "Passing",
                      "color": "green"
                    }
                  }
                }
              ]
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "values": false,
              "calcs": [
                "lastNotNull"
              ],
              "fields": ""
            },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "value",
            "graphMode": "none",
            "justifyMode": "auto"
          }
        },
        {
          "id": 3,
          "type": "stat",
          "title": "Backend Failed/Error",
          "description": "",
          "datasource": {
            "type": "prometheus",
            "uid": "ai_tutor_quality_prometheus"
          },
          "gridPos": {
            "h": 5,
            "w": 4,
            "x": 4,
            "y": 4
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(ai_tutor_quality_checks_total{environment=\"openshift-dev\",repository=\"AI_Tutor_Analysis\",source=\"live_observability\",status=~\"failed|error\"})",
              "instant": true,
              "range": false
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "orange",
                    "value": 1
                  },
                  {
                    "color": "red",
                    "value": 2
                  }
                ]
              },
              "mappings": []
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "values": false,
              "calcs": [
                "lastNotNull"
              ],
              "fields": ""
            },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "value",
            "graphMode": "none",
            "justifyMode": "auto"
          }
        },
        {
          "id": 4,
          "type": "stat",
          "title": "Frontend Playwright",
          "description": "Latest live Playwright signal.",
          "datasource": {
            "type": "prometheus",
            "uid": "ai_tutor_quality_prometheus"
          },
          "gridPos": {
            "h": 5,
            "w": 4,
            "x": 8,
            "y": 4
          },
          "targets": [
            {
              "refId": "A",
              "expr": "max(ai_tutor_quality_source_ok{environment=\"openshift-dev\",repository=\"NAGA-open-webui\",source=\"playwright_ui\"})",
              "instant": true,
              "range": false
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "none",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "red",
                    "value": null
                  },
                  {
                    "color": "green",
                    "value": 1
                  }
                ]
              },
              "mappings": [
                {
                  "type": "value",
                  "options": {
                    "0": {
                      "text": "Needs attention",
                      "color": "red"
                    },
                    "1": {
                      "text": "Passing",
                      "color": "green"
                    }
                  }
                }
              ]
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "values": false,
              "calcs": [
                "lastNotNull"
              ],
              "fields": ""
            },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "value",
            "graphMode": "none",
            "justifyMode": "auto"
          }
        },
        {
          "id": 5,
          "type": "stat",
          "title": "Frontend Failed/Skipped",
          "description": "",
          "datasource": {
            "type": "prometheus",
            "uid": "ai_tutor_quality_prometheus"
          },
          "gridPos": {
            "h": 5,
            "w": 4,
            "x": 12,
            "y": 4
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(ai_tutor_quality_checks_total{environment=\"openshift-dev\",repository=\"NAGA-open-webui\",source=\"playwright_ui\",status=~\"failed|error|skipped\"})",
              "instant": true,
              "range": false
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "orange",
                    "value": 1
                  },
                  {
                    "color": "red",
                    "value": 2
                  }
                ]
              },
              "mappings": []
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "values": false,
              "calcs": [
                "lastNotNull"
              ],
              "fields": ""
            },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "value",
            "graphMode": "none",
            "justifyMode": "auto"
          }
        },
        {
          "id": 6,
          "type": "stat",
          "title": "Backend Last Run Age",
          "description": "Seconds since latest backend quality run.",
          "datasource": {
            "type": "prometheus",
            "uid": "ai_tutor_quality_prometheus"
          },
          "gridPos": {
            "h": 5,
            "w": 4,
            "x": 16,
            "y": 4
          },
          "targets": [
            {
              "refId": "A",
              "expr": "time() - max(ai_tutor_quality_source_last_run_timestamp_seconds{environment=\"openshift-dev\",repository=\"AI_Tutor_Analysis\",source=\"live_observability\"})",
              "instant": true,
              "range": false
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "orange",
                    "value": 1
                  },
                  {
                    "color": "red",
                    "value": 2
                  }
                ]
              },
              "mappings": []
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "values": false,
              "calcs": [
                "lastNotNull"
              ],
              "fields": ""
            },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "value",
            "graphMode": "none",
            "justifyMode": "auto"
          }
        },
        {
          "id": 7,
          "type": "stat",
          "title": "Frontend Last Run Age",
          "description": "Seconds since latest frontend Playwright run.",
          "datasource": {
            "type": "prometheus",
            "uid": "ai_tutor_quality_prometheus"
          },
          "gridPos": {
            "h": 5,
            "w": 4,
            "x": 20,
            "y": 4
          },
          "targets": [
            {
              "refId": "A",
              "expr": "time() - max(ai_tutor_quality_source_last_run_timestamp_seconds{environment=\"openshift-dev\",repository=\"NAGA-open-webui\",source=\"playwright_ui\"})",
              "instant": true,
              "range": false
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "orange",
                    "value": 1
                  },
                  {
                    "color": "red",
                    "value": 2
                  }
                ]
              },
              "mappings": []
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "values": false,
              "calcs": [
                "lastNotNull"
              ],
              "fields": ""
            },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "value",
            "graphMode": "none",
            "justifyMode": "auto"
          }
        },
        {
          "id": 8,
          "type": "timeseries",
          "title": "Backend Service Health Over Time",
          "description": "One line per deployed backend dependency/service.",
          "datasource": {
            "type": "prometheus",
            "uid": "ai_tutor_quality_prometheus"
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 9
          },
          "targets": [
            {
              "refId": "A",
              "expr": "ai_tutor_quality_service_ok{environment=\"openshift-dev\",repository=\"AI_Tutor_Analysis\",source=\"live_observability\"}",
              "legendFormat": "{{service}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "stepAfter",
                "lineWidth": 2,
                "fillOpacity": 10,
                "showPoints": "auto",
                "spanNulls": false
              }
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "single",
              "sort": "none"
            }
          }
        },
        {
          "id": 9,
          "type": "timeseries",
          "title": "Failures, Errors, and Skips Over Time",
          "description": "",
          "datasource": {
            "type": "prometheus",
            "uid": "ai_tutor_quality_prometheus"
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 9
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum by (repository, source, status) (ai_tutor_quality_checks_total{environment=\"openshift-dev\",status=~\"failed|error|skipped\"})",
              "legendFormat": "{{repository}} {{source}} {{status}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "stepAfter",
                "lineWidth": 2,
                "fillOpacity": 10,
                "showPoints": "auto",
                "spanNulls": false
              }
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "single",
              "sort": "none"
            }
          }
        },
        {
          "id": 10,
          "type": "table",
          "title": "Backend Check Groups",
          "description": "Latest backend counts by group.",
          "datasource": {
            "type": "prometheus",
            "uid": "ai_tutor_quality_prometheus"
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 17
          },
          "targets": [
            {
              "refId": "A",
              "expr": "ai_tutor_quality_group_checks_total{environment=\"openshift-dev\",repository=\"AI_Tutor_Analysis\",source=\"live_observability\"}",
              "format": "table",
              "instant": true,
              "range": false
            }
          ],
          "transformations": [
            {
              "id": "labelsToFields",
              "options": {
                "mode": "columns"
              }
            },
            {
              "id": "organize",
              "options": {
                "excludeByName": {
                  "Time": true,
                  "__name__": true,
                  "environment": true,
                  "instance": true,
                  "job": true,
                  "repository": true,
                  "source": true
                },
                "renameByName": {
                  "Value": "count",
                  "group": "group",
                  "status": "result"
                }
              }
            }
          ],
          "options": {
            "showHeader": true,
            "cellHeight": "sm",
            "footer": {
              "show": false
            }
          }
        },
        {
          "id": 11,
          "type": "table",
          "title": "Backend Service Checks",
          "description": "Latest backend counts by service.",
          "datasource": {
            "type": "prometheus",
            "uid": "ai_tutor_quality_prometheus"
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 17
          },
          "targets": [
            {
              "refId": "A",
              "expr": "ai_tutor_quality_service_checks_total{environment=\"openshift-dev\",repository=\"AI_Tutor_Analysis\",source=\"live_observability\"}",
              "format": "table",
              "instant": true,
              "range": false
            }
          ],
          "transformations": [
            {
              "id": "labelsToFields",
              "options": {
                "mode": "columns"
              }
            },
            {
              "id": "organize",
              "options": {
                "excludeByName": {
                  "Time": true,
                  "__name__": true,
                  "environment": true,
                  "instance": true,
                  "job": true,
                  "repository": true,
                  "source": true
                },
                "renameByName": {
                  "Value": "count",
                  "service": "service",
                  "status": "result"
                }
              }
            }
          ],
          "options": {
            "showHeader": true,
            "cellHeight": "sm",
            "footer": {
              "show": false
            }
          }
        },
        {
          "id": 12,
          "type": "table",
          "title": "Frontend Playwright Workflows",
          "description": "Latest live workflow status and duration.",
          "datasource": {
            "type": "prometheus",
            "uid": "ai_tutor_quality_prometheus"
          },
          "gridPos": {
            "h": 9,
            "w": 12,
            "x": 0,
            "y": 25
          },
          "targets": [
            {
              "refId": "A",
              "expr": "ai_tutor_playwright_workflow_duration_seconds{environment=\"openshift-dev\",repository=\"NAGA-open-webui\"}",
              "format": "table",
              "instant": true,
              "range": false
            }
          ],
          "transformations": [
            {
              "id": "labelsToFields",
              "options": {
                "mode": "columns"
              }
            },
            {
              "id": "organize",
              "options": {
                "excludeByName": {
                  "Time": true,
                  "__name__": true,
                  "environment": true,
                  "instance": true,
                  "job": true,
                  "repository": true
                },
                "renameByName": {
                  "Value": "duration seconds",
                  "workflow": "workflow",
                  "project": "project",
                  "status": "result",
                  "group": "group"
                }
              }
            }
          ],
          "options": {
            "showHeader": true,
            "cellHeight": "sm",
            "footer": {
              "show": false
            }
          }
        },
        {
          "id": 13,
          "type": "timeseries",
          "title": "Playwright Workflow Durations",
          "description": "Workflow duration history.",
          "datasource": {
            "type": "prometheus",
            "uid": "ai_tutor_quality_prometheus"
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 25
          },
          "targets": [
            {
              "refId": "A",
              "expr": "ai_tutor_playwright_workflow_duration_seconds{environment=\"openshift-dev\",repository=\"NAGA-open-webui\"}",
              "legendFormat": "{{workflow}} {{status}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "stepAfter",
                "lineWidth": 2,
                "fillOpacity": 10,
                "showPoints": "auto",
                "spanNulls": false
              }
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "single",
              "sort": "none"
            }
          }
        },
        {
          "id": 14,
          "type": "table",
          "title": "Slowest Current Checks",
          "description": "Current slowest backend checks and Playwright workflows.",
          "datasource": {
            "type": "prometheus",
            "uid": "ai_tutor_quality_prometheus"
          },
          "gridPos": {
            "h": 9,
            "w": 24,
            "x": 0,
            "y": 34
          },
          "targets": [
            {
              "refId": "A",
              "expr": "topk(20, ai_tutor_quality_check_duration_seconds{environment=\"openshift-dev\"})",
              "format": "table",
              "instant": true,
              "range": false
            }
          ],
          "transformations": [
            {
              "id": "labelsToFields",
              "options": {
                "mode": "columns"
              }
            },
            {
              "id": "organize",
              "options": {
                "excludeByName": {
                  "Time": true,
                  "__name__": true,
                  "environment": true,
                  "instance": true,
                  "job": true,
                  "classname": true
                },
                "renameByName": {
                  "Value": "duration seconds",
                  "repository": "repo",
                  "group": "group",
                  "service": "service/project",
                  "name": "check/workflow",
                  "status": "result",
                  "source": "source"
                }
              }
            }
          ],
          "options": {
            "showHeader": true,
            "cellHeight": "sm",
            "footer": {
              "show": false
            }
          }
        },
        {
          "id": 15,
          "type": "text",
          "title": "Reports and Run History",
          "gridPos": {
            "h": 4,
            "w": 24,
            "x": 0,
            "y": 43
          },
          "options": {
            "mode": "markdown",
            "content": "Open the artifact viewer for the latest and recent Playwright reports: [AI Tutor Quality Artifacts](https://ai-tutor-quality-artifacts-rit-genai-naga-dev.apps.cloud.rt.nyu.edu).\n\nPrometheus stores numeric history for 30 days. Heavy reports, screenshots, videos, traces, and future Allure output belong in ObjectBucket/S3."
          }
        }
      ]
    }
