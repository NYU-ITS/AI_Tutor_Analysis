apiVersion: batch/v1
kind: CronJob
metadata:
  name: ai-tutor-github-quality-sync
  labels:
    app.kubernetes.io/name: ai-tutor-github-quality-sync
    app.kubernetes.io/component: github-quality-sync
    app.kubernetes.io/part-of: ai-tutor-observability
spec:
  schedule: "*/10 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 0
  failedJobsHistoryLimit: 1
  startingDeadlineSeconds: 600
  jobTemplate:
    spec:
      backoffLimit: 1
      ttlSecondsAfterFinished: 600
      template:
        metadata:
          labels:
            app.kubernetes.io/name: ai-tutor-github-quality-sync
            app.kubernetes.io/component: github-quality-sync
            app.kubernetes.io/part-of: ai-tutor-observability
        spec:
          restartPolicy: Never
          nodeSelector:
            topology.kubernetes.io/region: rcdc
          containers:
            - name: github-quality-sync
              image: image-registry.openshift-image-registry.svc:5000/rit-genai-naga-dev/ai-tutor-quality-checks:latest
              imagePullPolicy: Always
              envFrom:
                - secretRef:
                    name: ai-tutor-test-artifacts-bucket
                - configMapRef:
                    name: ai-tutor-test-artifacts-bucket
              command:
                - /bin/sh
                - -ec
                - |
                  python scripts/sync_github_quality_metrics.py
                  GITHUB_REPOSITORY_NAME=AI_Tutor_Analysis \
                    GITHUB_BRANCH_FILTER=feature/test-suite-expansion \
                    GITHUB_ARTIFACT_NAME=test-results \
                    ARTIFACT_PREFIX=github/backend/feature-test-suite-expansion \
                    python scripts/quality_artifact_store.py sync-github-backend
                  GITHUB_REPOSITORY_NAME=NAGA-open-webui \
                    GITHUB_BRANCH_FILTER=rs/ai-tutor-tests \
                    ARTIFACT_PREFIX=github/frontend/rs-ai-tutor-tests \
                    python scripts/quality_artifact_store.py sync-github-playwright
              env:
                - name: GITHUB_OWNER
                  value: NYU-ITS
                - name: GITHUB_QUALITY_ARTIFACTS
                  value: AI_Tutor_Analysis:ai-tutor-backend-quality-metrics,NAGA-open-webui:ai-tutor-frontend-quality-metrics
                - name: GITHUB_BRANCH_FILTER
                  value: ""
                - name: QUALITY_ENVIRONMENT
                  value: github-actions
                - name: QUALITY_PUSHGATEWAY_URL
                  value: http://ai-tutor-quality-pushgateway:9091
                - name: BUCKET_TLS_VERIFY
                  value: "false"
                - name: GITHUB_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: ai-tutor-github-metrics-sync-secret
                      key: GITHUB_TOKEN
                      optional: false
              resources:
                requests:
                  cpu: 50m
                  memory: 128Mi
                limits:
                  cpu: 300m
                  memory: 384Mi
