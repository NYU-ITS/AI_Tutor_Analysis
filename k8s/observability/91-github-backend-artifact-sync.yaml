apiVersion: batch/v1
kind: CronJob
metadata:
  name: ai-tutor-github-backend-artifact-sync
  labels:
    app.kubernetes.io/name: ai-tutor-github-backend-artifact-sync
    app.kubernetes.io/component: artifact-sync
    app.kubernetes.io/part-of: ai-tutor-observability
spec:
  schedule: "*/10 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  startingDeadlineSeconds: 600
  jobTemplate:
    spec:
      backoffLimit: 1
      ttlSecondsAfterFinished: 600
      template:
        metadata:
          labels:
            app.kubernetes.io/name: ai-tutor-github-backend-artifact-sync
            app.kubernetes.io/component: artifact-sync
            app.kubernetes.io/part-of: ai-tutor-observability
        spec:
          restartPolicy: Never
          nodeSelector:
            topology.kubernetes.io/region: rcdc
          containers:
            - name: artifact-sync
              image: image-registry.openshift-image-registry.svc:5000/rit-genai-naga-dev/ai-tutor-quality-checks:latest
              imagePullPolicy: Always
              command:
                - python
                - scripts/quality_artifact_store.py
                - sync-github-backend
              envFrom:
                - secretRef:
                    name: ai-tutor-test-artifacts-bucket
                - configMapRef:
                    name: ai-tutor-test-artifacts-bucket
              env:
                - name: GITHUB_OWNER
                  value: NYU-ITS
                - name: GITHUB_REPOSITORY_NAME
                  value: AI_Tutor_Analysis
                - name: GITHUB_BRANCH_FILTER
                  value: feature/test-suite-expansion
                - name: GITHUB_ARTIFACT_NAME
                  value: test-results
                - name: ARTIFACT_PREFIX
                  value: github/backend/feature-test-suite-expansion
                - name: BUCKET_TLS_VERIFY
                  value: "false"
                - name: GITHUB_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: ai-tutor-github-metrics-sync-secret
                      key: GITHUB_TOKEN
                      optional: false
              resources:
                requests:
                  cpu: 50m
                  memory: 128Mi
                limits:
                  cpu: 250m
                  memory: 256Mi
