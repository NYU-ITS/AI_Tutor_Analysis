apiVersion: batch/v1
kind: Job
metadata:
  name: ai-tutor-quality-grafana-provisioner
  labels:
    app.kubernetes.io/name: ai-tutor-quality-grafana-provisioner
    app.kubernetes.io/component: grafana-provisioner
    app.kubernetes.io/part-of: ai-tutor-observability
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ai-tutor-quality-grafana-provisioner
        app.kubernetes.io/component: grafana-provisioner
        app.kubernetes.io/part-of: ai-tutor-observability
    spec:
      restartPolicy: Never
      nodeSelector:
        topology.kubernetes.io/region: rcdc
      containers:
        - name: grafana-provisioner
          image: image-registry.openshift-image-registry.svc:5000/rit-genai-naga-dev/ai-tutor-quality-checks:latest
          imagePullPolicy: Always
          command:
            - python
            - scripts/provision_grafana_quality_assets.py
          env:
            - name: GRAFANA_URL
              value: http://ai-tutor-quality-grafana-service:3000
            - name: PROMETHEUS_URL
              value: http://ai-tutor-quality-prometheus:9090
            - name: GRAFANA_USER
              valueFrom:
                secretKeyRef:
                  name: ai-tutor-quality-grafana-admin-credentials
                  key: GF_SECURITY_ADMIN_USER
            - name: GRAFANA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ai-tutor-quality-grafana-admin-credentials
                  key: GF_SECURITY_ADMIN_PASSWORD
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
