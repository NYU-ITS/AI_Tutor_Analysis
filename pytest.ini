[pytest]
testpaths = tests
addopts = -ra -m "not live"
markers =
    unit: fast deterministic logic tests
    integration: API and database integration tests with mocked externals
    smoke: lightweight deployed-environment checks that verify critical routes respond
    health: service health/readiness checks for app and dependency availability
    external_service: checks that touch external services or managed dependencies
    live: tests that call real external services (Portkey LLM, OpenWebUI DB) - require valid credentials and network access
